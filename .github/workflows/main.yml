name: Update Metin2Alerts JSON

on:
  schedule:
    - cron: '*/1 * * * *' # cada minuto
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Clonar el repo usando persist-credentials para que GITHUB_TOKEN funcione
      - uses: actions/checkout@v3
        with:
          persist-credentials: true

      # 2️⃣ Descargar los JSON
      - name: Fetch JSON files
        run: |
          mkdir -p data
          curl -s https://metin2alerts.com/store/public/data/531.json -o data/531.json
          curl -s https://metin2alerts.com/m2_data/es/stat_map.json -o data/stat_map.json
          curl -s https://metin2alerts.com/m2_data/item_icon.json -o data/item_icon.json
          curl -s https://metin2alerts.com/m2_data/es/item_names.json -o data/item_names.json

      # 3️⃣ Commit y push usando el token integrado
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*.json
          git diff-index --quiet HEAD || git commit -m "Update JSON files"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
